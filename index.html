<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartCinema 智能影院选座系统 - 弧形Canvas布局，智能推荐，三厅切换">
    <title>SmartCinema - 智能影院选座系统</title>

    <!-- 核心样式 -->
    <link rel="stylesheet" href="public/styles/reset.css">
    <link rel="stylesheet" href="public/styles/variables.css">
    <link rel="stylesheet" href="public/styles/layout.css">
    <link rel="stylesheet" href="public/styles/components.css">
    <link rel="stylesheet" href="public/styles/responsive.css">
    <link rel="stylesheet" href="public/styles/accessibility.css">

    <style>
        /* 页面内联补充样式 (后期可抽到 components.css) */
        :root {
            --bg-primary: #0D1117;
            --bg-secondary: #161B22;
            --bg-card: #21262D;
            --text-primary: #C9D1D9;
            --text-secondary: #8B949E;
            --border-color: #30363D;
            --accent: #58A6FF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .app-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-logo { font-size: 1.4em; font-weight: 700; color: #FDD835; white-space: nowrap; }
        .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .header-controls select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.9em;
            cursor: pointer;
        }
        .header-controls select:focus { outline: none; border-color: var(--accent); }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover { border-color: #58A6FF; background: #1F2A38; }
        .btn-primary { background: #238636; border-color: #238636; color: #fff; }
        .btn-primary:hover { background: #2EA043; }
        .btn-warning { background: #D29922; border-color: #D29922; color: #fff; }
        .btn-danger { background: #DA3633; border-color: #DA3633; color: #fff; }
        .btn-accent { background: #1F6FEB; border-color: #1F6FEB; color: #fff; }
        .btn-sm { padding: 4px 10px; font-size: 0.8em; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Main Layout */
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 360px;
            grid-template-rows: auto auto auto;
            gap: 20px;
        }

        .section-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
        }
        .section-card h2 {
            font-size: 1.2em;
            margin-bottom: 16px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Canvas 区域占满左侧 */
        .canvas-section { grid-column: 1; grid-row: 1 / 4; }
        .canvas-container { text-align: center; margin: 0; }
        .canvas-container canvas { display: block; margin: 0 auto; }
        .canvas-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; justify-content: center; }

        /* 右侧面板 */
        .side-panel { grid-column: 2; }
        .recommend-section { grid-row: 1; }
        .score-section { grid-row: 2; max-height: 350px; overflow-y: auto; }
        .orders-section { grid-row: 3; max-height: 400px; overflow-y: auto; }

        /* 表单 */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.85em; color: var(--text-secondary); }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.9em;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* 统计面板 */
        .stats-row { display: flex; gap: 12px; margin-top: 12px; }
        .stat-item {
            flex: 1;
            text-align: center;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 10px;
        }
        .stat-value { font-size: 1.5em; font-weight: 700; }
        .stat-label { font-size: 0.8em; color: var(--text-secondary); }
        .stat-value.green { color: #10B981; }
        .stat-value.yellow { color: #F59E0B; }
        .stat-value.red { color: #EF4444; }

        /* 推荐结果 */
        .recommend-result {
            margin-top: 12px;
            padding: 14px;
            background: var(--bg-card);
            border-radius: 8px;
            border-left: 3px solid #8B5CF6;
            display: none;
            font-size: 0.88em;
            line-height: 1.6;
        }
        .recommend-result.active { display: block; }
        .recommend-result h4 { color: #A78BFA; margin-bottom: 8px; }

        /* 订单列表 */
        .order-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }
        .order-card.status-pending { border-left: 3px solid #D29922; }
        .order-card.status-confirmed { border-left: 3px solid #238636; }
        .order-card.status-cancelled { opacity: 0.5; border-left: 3px solid #666; }
        .order-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .order-id { font-weight: 600; color: var(--accent); }
        .order-status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .status-pending .order-status-badge { background: #D29922; color: #000; }
        .status-confirmed .order-status-badge { background: #238636; color: #fff; }
        .status-cancelled .order-status-badge { background: #666; color: #fff; }
        .order-actions-row { display: flex; gap: 6px; margin-top: 8px; }

        .orders-empty { text-align: center; color: var(--text-secondary); padding: 30px; }

        /* 认证模态框 */
        .auth-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .auth-modal-overlay.active { display: flex; }
        .auth-modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            max-height: calc(100dvh - 32px);
            overflow-y: auto;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .auth-modal h2 { color: var(--accent); margin-bottom: 20px; text-align: center; }
        .auth-modal .form-group { margin-bottom: 16px; }
        .auth-modal .btn { width: 100%; margin-top: 8px; padding: 10px; }
        .auth-modal .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            margin: 0;
            padding: 0;
            color: var(--text-secondary);
        }
        .auth-modal .modal-close:hover { color: var(--text-primary); background: var(--bg-card); }
        .auth-error { color: #F85149; font-size: 0.85em; margin-top: 8px; display: none; }
        .auth-switch-link { text-align: center; margin-top: 12px; font-size: 0.85em; }
        .auth-switch-link button {
            border: 0;
            padding: 4px;
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
            font: inherit;
        }

        /* 评分区 */
        .score-placeholder { text-align: center; color: var(--text-secondary); padding: 20px; }

        /* 响应式 */
        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .canvas-section { grid-row: auto; }
        }

        /* 暗色滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #556; }

        /* 年龄段多选 */
        .age-check-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-right: 12px;
            font-size: 0.9em;
            cursor: pointer;
            color: var(--text-primary);
        }
        .age-check-label input[type="checkbox"] { width: auto; cursor: pointer; }

        /* 全局过渡 */
        .section-card { transition: border-color 0.2s; }
        .section-card:hover { border-color: #3B4A5E; }

        /* AI 聊天机器人 */
        #ai-chatbot { position: fixed; bottom: 24px; right: 24px; z-index: 999; }
        #ai-chat-toggle {
            width: 56px; height: 56px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #8B5CF6, #6366F1);
            color: #fff; font-size: 1.5em; cursor: pointer;
            box-shadow: 0 4px 16px rgba(99,102,241,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #ai-chat-toggle:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(99,102,241,0.6); }
        #ai-chat-panel {
            position: absolute; bottom: 68px; right: 0;
            width: 340px; max-height: 480px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .ai-chat-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #8B5CF6, #6366F1);
            color: #fff; font-weight: 700; font-size: 0.95em;
        }
        .ai-chat-header button {
            background: none; border: none; color: #fff; cursor: pointer;
            font-size: 1.1em; opacity: 0.8;
        }
        .ai-chat-header button:hover { opacity: 1; }
        #ai-chat-messages {
            flex: 1; overflow-y: auto; padding: 12px;
            display: flex; flex-direction: column; gap: 8px;
            max-height: 260px;
        }
        .ai-chat-msg {
            max-width: 85%; padding: 8px 12px; border-radius: 10px;
            font-size: 0.85em; line-height: 1.5; white-space: pre-line;
        }
        .ai-chat-msg.bot { background: var(--bg-card); color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 3px; }
        .ai-chat-msg.user { background: #6366F1; color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
        #ai-chat-suggestions {
            display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 8px;
        }
        .ai-chat-chip {
            padding: 4px 10px; border-radius: 14px; border: 1px solid var(--border-color);
            background: var(--bg-card); color: var(--text-secondary);
            font-size: 0.78em; cursor: pointer; transition: all 0.15s;
        }
        .ai-chat-chip:hover { border-color: #8B5CF6; color: #A78BFA; }
        .ai-chat-input-row {
            display: flex; gap: 6px; padding: 8px 12px 12px;
            border-top: 1px solid var(--border-color);
        }
        .ai-chat-input-row input {
            flex: 1; padding: 8px 10px; border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary); color: var(--text-primary);
            font-size: 0.85em;
        }
        .ai-chat-input-row input:focus { outline: none; border-color: #8B5CF6; }
        .ai-chat-input-row button {
            padding: 8px 14px; border-radius: 8px; border: none;
            background: #8B5CF6; color: #fff; font-weight: 600;
            cursor: pointer; font-size: 0.85em; transition: background 0.15s;
        }
        .ai-chat-input-row button:hover { background: #7C3AED; }

        /* 主题色选择 */
        .theme-dot {
            display: inline-block; width: 22px; height: 22px; border-radius: 50%;
            cursor: pointer; border: 2px solid transparent; transition: all 0.2s;
            vertical-align: middle;
        }
        .theme-dot:hover { transform: scale(1.25); border-color: #fff; }
        .theme-dot.active { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
    </style>
</head>
<body>
    <!-- ==================== 顶部导航 ==================== -->
    <header class="app-header">
        <span class="app-logo">🎬 SmartCinema</span>
        <div class="header-controls">
            <!-- 放映厅切换 -->
            <select id="hall-selector" aria-label="切换放映厅">
                <option value="small">小厅 (100座)</option>
                <option value="medium" selected>中厅 (200座)</option>
                <option value="large">大厅 (300座)</option>
            </select>
            <span id="hall-name-display" style="color:var(--text-secondary);font-size:0.85em">中厅</span>
            <!-- 日期切换 -->
            <select id="day-selector" aria-label="切换日期">
                <option value="0">周一</option><option value="1">周二</option><option value="2">周三</option>
                <option value="3" selected>周四</option><option value="4">周五</option>
                <option value="5">周六</option><option value="6">周日</option>
            </select>
            <!-- 认证按钮 -->
            <span id="user-info" style="display:none;align-items:center;gap:8px;font-size:0.9em;"></span>
            <button class="btn btn-accent btn-sm" id="btn-login">登录</button>
            <button class="btn btn-sm" id="btn-register">注册</button>
            <button class="btn btn-sm" id="btn-logout" style="display:none">退出</button>
            <button class="btn btn-warning btn-sm" id="btn-admin" style="display:none">后台</button>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <div class="main-container">

        <!-- 左侧：Canvas 选座区 -->
        <section class="section-card canvas-section" id="seat-selection">
            <h2>🪑 选座</h2>
            <div class="canvas-toolbar">
                <button class="btn btn-primary btn-sm" id="smart-recommend">🤖 智能推荐</button>
                <button class="btn btn-sm" id="manual-select">✋ 手动选座</button>
                <button class="btn btn-sm" id="clear-selection">🗑️ 清空</button>
            </div>
            <div class="canvas-container">
                <canvas id="cinema-canvas" role="img" aria-label="影院座位布局图" tabindex="0"></canvas>
            </div>
            <!-- 座位统计 -->
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-value green" id="available-count">0</div>
                    <div class="stat-label">空座</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value yellow" id="selected-count">0</div>
                    <div class="stat-label">已选</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value red" id="sold-count">0</div>
                    <div class="stat-label">已售</div>
                </div>
            </div>
        </section>

        <!-- 右侧：推荐面板（级联拓扑选择） -->
        <section class="section-card side-panel recommend-section" id="recommend-panel">
            <h2>🤖 智能推荐</h2>
            <form id="recommend-form" class="recommend-form">
                <!-- ① 先选人数 -->
                <div class="form-group">
                    <label for="group-size">① 观影人数</label>
                    <input type="number" id="group-size" min="1" max="20" value="2" placeholder="1-20人">
                </div>
                <!-- ② 再选年龄段（>=2人可多选） -->
                <div class="form-group" id="age-group-wrapper">
                    <label>② 观众年龄段</label>
                    <div id="age-select-container">
                        <select id="age-group">
                            <option value="">-- 选择年龄段 --</option>
                            <option value="youth">少年 (15岁以下)</option>
                            <option value="adult">成年人 (15-59岁)</option>
                            <option value="senior">老年人 (60岁以上)</option>
                        </select>
                    </div>
                    <div id="age-check-container" style="display:none;">
                        <label class="age-check-label"><input type="checkbox" value="youth" class="age-check"> 少年</label>
                        <label class="age-check-label"><input type="checkbox" value="adult" class="age-check" checked> 成年</label>
                        <label class="age-check-label"><input type="checkbox" value="senior" class="age-check"> 老年</label>
                    </div>
                </div>
                <!-- ③ 观影类型（根据人数动态关联） -->
                <div class="form-group">
                    <label for="movie-type">③ 观影类型</label>
                    <select id="movie-type">
                        <option value="">-- 请先选择人数 --</option>
                    </select>
                </div>
                <!-- ④ 姓名/成员（人数决定显示方式） -->
                <div class="form-group" id="name-single-wrapper">
                    <label for="user-name">④ 姓名</label>
                    <input type="text" id="user-name" placeholder="请输入您的姓名" maxlength="30">
                </div>
                <div class="form-group" id="name-group-wrapper" style="display:none;">
                    <label for="member-names">④ 成员姓名（每行一个，共需 <span id="member-count-hint">2</span> 人）</label>
                    <textarea id="member-names" rows="4" placeholder="张三&#10;李四" maxlength="500"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">🎯 执行推荐</button>
            </form>
            <div class="recommend-result" id="recommend-result">
                <!-- 动态填充推荐结果 -->
            </div>
        </section>

        <!-- 右侧：评分 -->
        <section class="section-card side-panel score-section" id="experience-score">
            <h2>📊 观影体验评分</h2>
            <div id="score-details">
                <p class="score-placeholder">请先选择座位，系统将为您计算观影体验评分</p>
            </div>
            <!-- 观众手动评分 -->
            <div id="manual-score-panel" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border-color);">
                <h3 style="font-size:0.95em;color:var(--accent);margin-bottom:12px;">✍️ 我的评分（0-10分）</h3>
                <div class="form-group">
                    <label>👁️ 视野质量 <span id="manual-vision-val" style="color:var(--text-secondary);">5</span></label>
                    <input type="range" id="manual-vision" min="0" max="10" value="5" step="0.5" style="width:100%;">
                </div>
                <div class="form-group">
                    <label>📺 屏幕距离 <span id="manual-distance-val" style="color:var(--text-secondary);">5</span></label>
                    <input type="range" id="manual-distance" min="0" max="10" value="5" step="0.5" style="width:100%;">
                </div>
                <div class="form-group">
                    <label>🛋️ 舒适度 <span id="manual-comfort-val" style="color:var(--text-secondary);">5</span></label>
                    <input type="range" id="manual-comfort" min="0" max="10" value="5" step="0.5" style="width:100%;">
                </div>
                <div class="form-group">
                    <label>💰 价格划算度 <span id="manual-price-val" style="color:var(--text-secondary);">5</span></label>
                    <input type="range" id="manual-price" min="0" max="10" value="5" step="0.5" style="width:100%;">
                </div>
                <div id="combined-score-result" style="display:none;margin-top:12px;padding:10px;background:var(--bg-card);border-radius:8px;text-align:center;font-size:0.9em;"></div>
                <button class="btn btn-primary btn-sm" id="btn-submit-score" style="width:100%;margin-top:8px;">📝 提交我的评分</button>
            </div>
        </section>

        <!-- 右侧：提交订单 -->
        <section class="section-card side-panel" id="submit-order-section">
            <h2>🛒 提交订单</h2>
            <div id="order-summary-mini" style="margin-bottom:12px;font-size:0.85em;color:var(--text-secondary);">
                暂未选择座位
            </div>
            <button class="btn btn-accent" style="width:100%" id="btn-submit-order" disabled>📋 提交订单</button>
            <div style="margin-top:10px;">
                <button class="btn btn-sm" style="width:100%" id="btn-view-orders">📋 查看历史订单</button>
            </div>
            <div id="orders-mini-list" style="display:none;margin-top:12px;max-height:200px;overflow-y:auto;"></div>
        </section>

        <!-- 独立热度地图 -->
        <section class="section-card" id="heatmap-section" style="grid-column: 1 / -1;">
            <h2>🔥 影院热度地图</h2>
            <div class="canvas-container">
                <canvas id="heatmap-canvas" role="img" aria-label="影院热度地图，红色表示热门，黄色表示一般，蓝色表示冷门"></canvas>
            </div>
        </section>

        <!-- 设置 -->
        <section class="section-card" id="settings" style="grid-column: 1 / -1;">
            <h2>⚙️ 设置</h2>
            <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="theme-toggle"> 深色模式
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="accessibility-toggle"> 无障碍模式
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="voice-toggle"> 语音提示
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="colorblind-toggle"> 色盲友好模式
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="checkbox" id="realtime-toggle"> 实时模拟（WebSocket）
                </label>
                <button class="btn btn-sm" id="export-data">💾 导出数据</button>
                <button class="btn btn-sm" id="import-data">📂 导入数据</button>
                <span style="margin-left:12px;font-size:0.85em;color:var(--text-secondary);">主题色</span>
                <span class="theme-dot" data-accent="#58A6FF" style="background:#58A6FF;" title="默认蓝"></span>
                <span class="theme-dot" data-accent="#10B981" style="background:#10B981;" title="翡翠绿"></span>
                <span class="theme-dot" data-accent="#F59E0B" style="background:#F59E0B;" title="琥珀金"></span>
                <span class="theme-dot" data-accent="#EC4899" style="background:#EC4899;" title="玫瑰粉"></span>
                <span class="theme-dot" data-accent="#8B5CF6" style="background:#8B5CF6;" title="紫罗兰"></span>
                <input type="color" id="accent-picker" value="#58A6FF" title="自定义主题色" style="width:28px;height:28px;border:none;border-radius:50%;cursor:pointer;padding:0;">
            </div>
        </section>
    </div>

    <!-- ==================== 认证模态框 ==================== -->
    <div class="auth-modal-overlay" id="auth-modal" aria-hidden="true">
        <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-title" tabindex="-1">
            <button class="modal-close" id="auth-modal-close" type="button" aria-label="关闭登录注册对话框">✕</button>
            <h2 id="auth-title">用户登录</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label for="auth-username">用户名</label>
                    <input type="text" id="auth-username" placeholder="请输入用户名" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="auth-password">密码</label>
                    <input type="password" id="auth-password" placeholder="请输入密码" required minlength="6">
                </div>
                <div id="register-extra-fields" hidden>
                    <div class="form-group">
                        <label for="auth-name">姓名</label>
                        <input type="text" id="auth-name" placeholder="请输入真实姓名">
                    </div>
                    <div class="form-group">
                        <label for="auth-email">邮箱 (选填)</label>
                        <input type="email" id="auth-email" placeholder="请输入邮箱">
                    </div>
                </div>
                <button class="btn btn-primary" id="auth-submit" type="submit">登 录</button>
                <div class="auth-error" id="auth-error" role="alert" tabindex="-1"></div>
                <div class="auth-switch-link">
                    <button id="auth-switch" type="button">没有账号？立即注册</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================== AI 观影顾问 ==================== -->
    <div id="ai-chatbot">
        <button id="ai-chat-toggle" title="AI 观影顾问">💬</button>
        <div id="ai-chat-panel" style="display:none;">
            <div class="ai-chat-header">
                <span>🤖 AI 观影顾问</span>
                <button id="ai-chat-close">✕</button>
            </div>
            <div id="ai-chat-messages"></div>
            <div id="ai-chat-suggestions"></div>
            <div class="ai-chat-input-row">
                <input type="text" id="ai-chat-input" placeholder="输入问题，如「推荐座位」..." maxlength="200">
                <button id="ai-chat-send">发送</button>
            </div>
        </div>
    </div>

    <!-- ==================== 通用模态容器 ==================== -->
    <div id="modal-container" class="modal-container" role="dialog" aria-hidden="true"></div>

    <!-- ==================== 主应用脚本 ==================== -->
    <script type="module" src="src/app.js"></script>
</body>
</html>
