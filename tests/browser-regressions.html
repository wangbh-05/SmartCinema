<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCinema 浏览器回归契约</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #f0f6fc;
        }

        body {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 20px 64px;
        }

        h1 {
            margin-bottom: 8px;
            font-size: 28px;
        }

        .notice,
        .summary {
            padding: 14px 16px;
            border: 1px solid #30363d;
            border-radius: 10px;
            background: #161b22;
        }

        .summary {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        #results {
            display: grid;
            gap: 10px;
            padding: 0;
            list-style: none;
        }

        .result {
            padding: 12px 14px;
            border-left: 4px solid #8b949e;
            border-radius: 8px;
            background: #161b22;
        }

        .result.xfail { border-color: #d29922; }
        .result.pass { border-color: #3fb950; }
        .result.xpass { border-color: #f85149; }
        .result.error { border-color: #da3633; }
        .result.pending { opacity: 0.65; }

        .result strong {
            display: block;
            margin-bottom: 4px;
        }

        .result p {
            margin: 0;
            color: #b1bac4;
        }

        #fixture {
            position: fixed;
            left: -100000px;
            top: 0;
            width: 1600px;
            height: 1000px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <h1>SmartCinema 浏览器回归契约</h1>
    <p class="notice">
        本页只应在 <code>http://127.0.0.1:8080</code> 运行，以便与日常使用的
        <code>http://localhost:8080</code> 隔离存储。当前预期得到 12 个 PASS（11 个缺陷契约 + 1 个运行时健康检查）、0 个 XFAIL、0 个 XPASS、0 个 ERROR。
    </p>

    <div class="summary" aria-live="polite">
        <span id="run-status">准备运行…</span>
        <span>PASS：<strong id="pass-count">0</strong></span>
        <span>XFAIL：<strong id="xfail-count">0</strong></span>
        <span>XPASS：<strong id="xpass-count">0</strong></span>
        <span>ERROR：<strong id="error-count">0</strong></span>
    </div>

    <ol id="results"></ol>
    <div id="fixture" aria-hidden="true"></div>

    <script type="module" src="./browser-regressions.js"></script>
</body>
</html>
